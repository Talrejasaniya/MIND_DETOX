<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-KS78KWKMNY"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-KS78KWKMNY');
</script>
<link rel="icon" type="image/png" href="{{ url_for('/static', filename='favicon.png') }}">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Mind Detox</title>
  <link rel="stylesheet" href="css/styles.css?v=1.1" />
</head>
<body data-page="login">

  <div class="auth-page">
    <div class="auth-card">

      <div class="auth-logo">
        <div class="auth-logo-circle">🌿</div>
        <h1>Mind Detox</h1>
        <p>Welcome back — we've missed you</p>
      </div>

      <form id="login-form" novalidate method="POST">

        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input type="email" id="email" name="email" class="form-input"
            placeholder="you@example.com" autocomplete="email" required />
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="password-toggle">
            <input type="password" id="password" name="password" class="form-input"
              placeholder="Your password" autocomplete="current-password" required />
            <button type="button" class="toggle-pwd-btn" aria-label="Toggle password">👁</button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-full mt-2" style="padding:13px;font-size:15px">
          Sign In
        </button>

      </form>

      <div class="auth-divider">or</div>

      <a href="signup.html" class="btn btn-outline btn-full" style="padding:12px;font-size:15px">
        Create a new account
      </a>

      <p class="auth-footer-text">
        <a href="index.html" style="color:var(--text-light);font-weight:400">← Back to home</a>
      </p>

    </div>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
