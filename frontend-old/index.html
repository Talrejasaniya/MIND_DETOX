<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Mind Detox - A calm space for reflection and journaling">
    <meta name="theme-color" content="#4a7c7e">
    <title>Mind Detox</title>
    
    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/mirror.css">
    <link rel="stylesheet" href="css/journal.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <div class="header-brand">
                <h1 class="brand-title">mind detox</h1>
            </div>

            <!-- Navigation (shown only when authenticated) -->
            <nav class="header-nav" id="headerNav" style="display: none;">
                <button class="nav-link" data-view="mirror">mirror</button>
                <button class="nav-link" data-view="journal">journal</button>
            </nav>

            <!-- Auth Actions -->
            <div class="header-actions">
                <!-- Guest buttons -->
                <div id="guestActions">
                    <button class="btn-ghost" id="loginBtn">login</button>
                    <button class="btn btn-primary" id="signupBtn">sign up</button>
                </div>
                
                <!-- Authenticated button -->
                <div id="authActions" style="display: none;">
                    <button class="btn-ghost" id="logoutBtn">logout</button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="main-content">
        
        <!-- AI Mirror View -->
        <div id="mirrorView" class="view">
            <div class="mirror-container">
                <div class="mirror-intro">
                    <h2>ai mirror</h2>
                    <p class="text-muted">a space for reflection, not advice</p>
                </div>

                <div class="mirror-main">
                    <form id="mirrorForm" class="mirror-form">
                        <textarea 
                            id="mirrorInput" 
                            class="mirror-input" 
                            placeholder="what's on your mind..."
                            rows="6"
                        ></textarea>
                        
                        <div class="mirror-footer">
                            <div class="mirror-status">
                                <span id="guestStatus" class="text-muted"></span>
                            </div>
                            
                            <button type="submit" class="btn btn-primary" id="reflectBtn">
                                reflect
                            </button>
                        </div>
                    </form>

                    <!-- Error Display -->
                    <div id="mirrorError" class="mirror-error" style="display: none;">
                        <p class="text-error"></p>
                    </div>

                    <!-- Reflection Response -->
                    <div id="mirrorResponse" class="mirror-response" style="display: none;">
                        <div class="response-content">
                            <p id="reflectionText"></p>
                        </div>
                        
                        
                    </div>
                </div>
            </div>
        </div>

        <!-- Journal View -->
        <div id="journalView" class="view" style="display: none;">
            <div class="journal-layout">
                <div class="journal-container">
                    <!-- Journal Header -->
                    <div class="journal-header">
                        <h2>journal</h2>
                        <div class="journal-actions">
                            <button class="btn btn-secondary" id="toggleMemoriesBtn">
                                show memories
                            </button>
                            <button class="btn btn-primary" id="newEntryBtn">
                                new entry
                            </button>
                        </div>
                    </div>

                    <!-- Journal Editor -->
                    <div id="journalEditor" class="journal-editor" style="display: none;">
                        <input 
                            type="text" 
                            id="journalTitle" 
                            class="journal-title-input" 
                            placeholder="entry title..."
                        />
                        
                        <textarea 
                            id="journalContent" 
                            class="journal-content-input" 
                            placeholder="write your thoughts..."
                            rows="15"
                        ></textarea>

                        <p id="editorError" class="text-error mt-2" style="display: none;"></p>

                        <div class="editor-actions mt-3">
                            <button class="btn btn-primary" id="saveJournalBtn">save</button>
                            <button class="btn btn-secondary" id="cancelEditBtn">cancel</button>
                        </div>
                    </div>

                    <!-- Journal List -->
                    <div id="journalList" class="journal-list">
                        <div class="empty-state">
                            <p class="text-muted">loading journals...</p>
                        </div>
                    </div>

                    <!-- Locked State (for guests) -->
                    <div id="journalLocked" class="journal-locked" style="display: none;">
                        <div class="locked-content">
                            <h2>journal</h2>
                            <p class="text-muted mb-3">
                                create an account to access your private journal
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <!-- Memories Slide Panel -->
    <div id="memoriesOverlay" class="memories-overlay" style="display: none;"></div>
    <div id="memoriesPanel" class="memories-panel">
        <div class="memories-header">
            <h3>memories</h3>
            <button class="btn-ghost close-btn" id="closeMemoriesBtn">✕</button>
        </div>

        <div class="memories-content">
            <div id="memoriesList" class="memories-list"></div>
        </div>
    </div>

    <!-- Auth Modal -->
    <div id="authModal" class="auth-modal-overlay" style="display: none;">
        <div class="auth-modal">
            <button class="modal-close" id="closeAuthBtn">✕</button>

            <div class="auth-content">
                <h2 id="authTitle">welcome back</h2>
                <p class="text-muted mb-4" id="authSubtitle">
                    sign in to access your journal and unlimited reflections
                </p>

                <form id="authForm" class="auth-form">
                    <!-- Name field (only for signup) -->
                    

                    <!-- Email field -->
                    <div class="form-group">
                        <label for="authEmail">email</label>
                        <input 
                            type="email" 
                            id="authEmail" 
                            placeholder="you@example.com"
                            required
                        />
                    </div>

                    <!-- Password field -->
                    <div class="form-group">
                        <label for="authPassword">password</label>
                        <input 
                            type="password" 
                            id="authPassword" 
                            placeholder="••••••••"
                            required
                            minlength="8"
                        />
                    </div>

                    <p id="authError" class="text-error" style="display: none;"></p>

                    <button type="submit" class="btn btn-primary auth-submit" id="authSubmitBtn">
                        sign in
                    </button>
                </form>

                <div class="auth-footer">
                    <button class="link-button" id="switchAuthModeBtn">
                        don't have an account? sign up
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/views.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
